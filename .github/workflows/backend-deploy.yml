name: Backend Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west1
      SERVICE_NAME: wyrmhort-backend
    steps:
      - name: Checkout codebase
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Create .env file
        run: echo "ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }}" > backend/src/.env
      - name: Build and Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source ./backend \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars "FIREBASE_CREDENTIALS_B64=${{ secrets.FIREBASE_CREDENTIALS_B64 }},ENVIRONMENT=production" \
            --quiet
      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)')
          curl --fail $SERVICE_URL/health || (echo "Backend failed to deploy!" && exit 1)
          echo "🚀 Deployed to: $SERVICE_URL"
