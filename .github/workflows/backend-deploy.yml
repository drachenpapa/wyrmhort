name: Backend Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west1
      SERVICE_NAME: wyrmhort-backend
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Setup environment for SBOM
        uses: ./.github/actions/backend-setup
      - name: Generate SBOM
        run: |
          cd backend
          uv export --no-hashes --format requirements-txt > requirements-sbom.txt
          uv run cyclonedx-py requirements requirements-sbom.txt --output-format json --output-file sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-production-${{ github.run_number }}
          path: backend/sbom.json
          retention-days: 90
      - name: Create .env file
        run: echo "ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }}" > backend/src/.env
      - name: Create firebase key file
        run: |
          mkdir -p backend/secrets
          echo "${{ secrets.FIREBASE_CREDENTIALS_B64 }}" \
          | base64 --decode > backend/secrets/firebase-key.json
      - name: Build and Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source ./backend \
            --region $REGION \
            --allow-unauthenticated \
            --quiet
      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)')
          curl --fail $SERVICE_URL/health || (echo "Backend failed to deploy!" && exit 1)
          echo "🚀 Deployed to: $SERVICE_URL"
