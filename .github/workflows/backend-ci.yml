name: Backend CI

on:
  push:
    branches: ["main"]
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

permissions:
  contents: read

jobs:
  compile:
    name: Compile Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Syntax check
        run: uv run python -m compileall src

  mypy:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Type check
        run: uv run mypy src

  ruff-lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Lint
        run: uv run ruff check src

  ruff-format:
    name: Format check (ruff)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Format check
        run: uv run ruff format --check src

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [mypy, ruff-lint, ruff-format]
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Check dependencies for vulnerabilities
        run: uv run pip-audit --skip-editable

  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    needs: [mypy, ruff-lint, ruff-format]
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Scan code for security issues
        run: uv run bandit -c pyproject.toml -r src/

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: [security-audit, security-scan]
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Run unit tests
        run: uv run pytest tests/unit --maxfail=1 --disable-warnings -q

  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs: [security-audit, security-scan]
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/backend-setup
      - name: Run integration tests
        run: uv run pytest tests/integration --maxfail=1 --disable-warnings -q

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [security-audit, security-scan, unit-tests, integration-tests]
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
      - name: Set up Docker
        uses: docker/setup-buildx-action@v4
      - name: Create .env file
        run: echo "ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }}" > src/.env
      - name: Create firebase key file
        run: |
          mkdir -p secrets
          echo "${{ secrets.FIREBASE_CREDENTIALS }}" > secrets/firebase-key.json
      - name: Build Docker image
        run: docker build -t wyrmhort-backend .
